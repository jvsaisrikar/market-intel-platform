schema:
  - gateway/graph/*.graphqls

exec:
  package: graph
  layout: single-file
  filename: gateway/graph/generated.go

model:
  filename: gateway/graph/model/models_gen.go
  package: model

resolver:
  package: graph
  layout: follow-schema
  dir: gateway/graph
  filename_template: "{name}.resolvers.go"

autobind: []

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int32

skip_mod_tidy: true
